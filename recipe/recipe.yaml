# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.4.10"

package:
  name: python-cityhash
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/cityhash/cityhash-${{ version }}.tar.gz
  sha256: 7e35da9aaf5fcf91da3fea23405874db55ffa58b1abc441d39cce0c8704a9c15

build:
  number: 2
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - cython
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
  host:
    - python
    - cython
    - py-cpuinfo
    - setuptools
    - wheel
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - cityhash
        - cityhashcrc
        - farmhash
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/cityhash
  repository: https://github.com/escherba/python-cityhash
  license: MIT
  license_file: LICENSE
  summary: Python bindings for CityHash and FarmHash
  description: |
    Python wrapper for FarmHash and CityHash — two families of fast
    non-cryptographic hash functions originally from Google. The package
    exposes three Python modules (cityhash, cityhashcrc, farmhash) that
    each wrap the respective C/C++ reference implementation. Commonly
    used for hashing strings into 64- or 128-bit fingerprints where
    collision rate matters more than cryptographic security (e.g.
    sharding keys, content addressing, bloom-filter seeds).

extra:
  recipe-maintainers:
    - charlesbluca
